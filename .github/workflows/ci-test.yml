# CI runs on Node.js 24.x
name: CI Test

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      localstack:
        image: localstack/localstack:4
        ports:
          - 4566:4566
        env:
          SERVICES: sqs
          DEBUG: "0"
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_localstack/health | grep -qE 'sqs.*(running|available)'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 36

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Copy ElasticMQ config
        run: sudo cp ${{ github.workspace }}/elasticmq.conf /tmp/elasticmq.conf

      - name: Start ElasticMQ
        run: docker run -d -p 9324:9324 -v /tmp/elasticmq.conf:/opt/elasticmq.conf --name elasticmq softwaremill/elasticmq

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"

      - name: Install Packages
        run: npm i

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test
