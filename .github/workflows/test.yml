name: CI Test

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]
    services:
      localstack:
        image: localstack/localstack:3
        ports:
          - 4566:4566
        env:
          SERVICES: sqs
          DEBUG: "0"
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_localstack/health | grep -qE 'sqs.*(running|available)'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 36
    steps:
      - uses: actions/checkout@v4
        name: Checkout code
      - run: sudo cp ${{ github.workspace }}/elasticmq.conf /tmp/elasticmq.conf
      # - name: Restart elasticmq
      #   uses: docker://docker
      #   with:
      #     args: docker restart elasticmq
      - name: Start ElasticMQ container with custom config
        run: docker run -d -p 9324:9324 -v /tmp/elasticmq.conf:/opt/elasticmq.conf --name elasticmq softwaremill/elasticmq
      - uses: actions/setup-node@v4
        name: Use Node.js ${{ matrix.node-version }}
        with:
          node-version: ${{ matrix.node-version }}
      - name: npm install
        run: npm i
      - name: check lint
        run: npm run lint
      - name: npm test
        run: npm run test
